<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deyimlerin Hikayesi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf8f3;
      --parchment: #f0ebe0;
      --sand: #e2d9c8;
      --brown-light: #c4a882;
      --brown-mid: #8b6914;
      --brown-dark: #4a3520;
      --ink: #2c1f0e;
      --accent: #b85c38;
      --accent-light: #e8845f;
      --teal: #2a6b6b;
      --shadow-sm: 0 2px 8px rgba(44,31,14,0.08);
      --shadow-md: 0 4px 20px rgba(44,31,14,0.12);
      --shadow-lg: 0 8px 40px rgba(44,31,14,0.15);
      --radius: 16px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.7;
      background-image:
        radial-gradient(ellipse at 10% 20%, rgba(196,168,130,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 80%, rgba(184,92,56,0.08) 0%, transparent 50%);
    }

    /* ── HEADER ── */
    header {
      background: var(--brown-dark);
      color: var(--cream);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(44,31,14,0.3);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 20px;
      height: 72px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      white-space: nowrap;
      color: var(--brown-light);
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: color .2s;
      text-decoration: none;
    }
    .logo:hover { color: var(--cream); }
    .logo span { color: var(--accent-light); }

    .search-wrap {
      flex: 1;
      max-width: 480px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      background: rgba(250,248,243,0.12);
      border: 1px solid rgba(196,168,130,0.3);
      color: var(--cream);
      padding: 10px 16px 10px 44px;
      border-radius: 50px;
      font-family: 'Lora', serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color .2s, background .2s;
    }
    .search-wrap input::placeholder { color: rgba(250,248,243,0.45); }
    .search-wrap input:focus {
      border-color: var(--brown-light);
      background: rgba(250,248,243,0.18);
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      opacity: .5;
      pointer-events: none;
    }

    /* ── MAIN ── */
    main { max-width: 1200px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 56px 0 48px;
    }
    .hero-eyebrow {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(184,92,56,0.1);
      border: 1px solid rgba(184,92,56,0.25);
      padding: 4px 14px;
      border-radius: 50px;
      margin-bottom: 20px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      color: var(--brown-dark);
      line-height: 1.2;
      margin-bottom: 16px;
    }
    .hero p {
      color: #6b5740;
      font-size: 1.05rem;
      max-width: 520px;
      margin: 0 auto 12px;
      font-style: italic;
    }
    .count-badge {
      display: inline-block;
      background: var(--sand);
      color: var(--brown-mid);
      font-size: 0.82rem;
      padding: 4px 12px;
      border-radius: 50px;
      margin-top: 8px;
      font-style: normal;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(196,168,130,0.2);
      overflow: hidden;
      cursor: pointer;
      transition: transform .25s, box-shadow .25s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }
    .card-top {
      padding: 24px 24px 16px;
      flex: 1;
    }
    .card-num {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--brown-light);
      margin-bottom: 10px;
    }
    .card-en {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--brown-dark);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .card-tr {
      font-size: 0.9rem;
      color: var(--accent);
      font-style: italic;
      margin-bottom: 12px;
    }
    .card-preview {
      font-size: 0.85rem;
      color: #7a6550;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--parchment);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tag {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--parchment);
      color: var(--brown-mid);
      padding: 3px 10px;
      border-radius: 50px;
    }
    .btn-incele {
      background: var(--brown-dark);
      color: var(--cream);
      border: none;
      padding: 8px 20px;
      border-radius: 50px;
      font-family: 'Lora', serif;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-incele:hover { background: var(--accent); }

    /* ── DETAIL PAGE ── */
    #detail { display: none; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1px solid var(--sand);
      color: var(--brown-mid);
      padding: 10px 20px;
      border-radius: 50px;
      font-family: 'Lora', serif;
      font-size: 0.88rem;
      cursor: pointer;
      margin-bottom: 36px;
      transition: background .2s, color .2s;
    }
    .back-btn:hover {
      background: var(--brown-dark);
      color: var(--cream);
      border-color: var(--brown-dark);
    }

    .detail-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(196,168,130,0.2);
      overflow: hidden;
      max-width: 820px;
      margin: 0 auto;
    }
    .detail-header {
      background: var(--brown-dark);
      padding: 48px 48px 40px;
      position: relative;
      overflow: hidden;
    }
    .detail-header::before {
      content: '\201C';
      font-family: 'Playfair Display', serif;
      font-size: 240px;
      color: rgba(196,168,130,0.1);
      position: absolute;
      top: -40px;
      left: 24px;
      line-height: 1;
      pointer-events: none;
    }
    .detail-num {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brown-light);
      margin-bottom: 16px;
    }
    .detail-en {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 700;
      color: var(--cream);
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .detail-tr {
      font-size: 1.05rem;
      color: var(--accent-light);
      font-style: italic;
    }

    .detail-body { padding: 40px 48px 48px; }

    .story-section {
      margin-bottom: 32px;
    }
    .story-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brown-light);
      margin-bottom: 14px;
      font-style: normal;
    }
    .story-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--sand);
    }
    .story-flag {
      display: inline-block;
      font-size: 1.1rem;
      margin-right: 2px;
    }
    .story-text {
      font-size: 1.05rem;
      color: #3d2e1e;
      line-height: 1.95;
      border-left: 3px solid var(--brown-light);
      padding-left: 20px;
    }
    .story-text.accent-border { border-color: var(--accent); }

    .divider {
      border: none;
      border-top: 2px dashed var(--sand);
      margin: 32px 0;
    }

    /* no results */
    .no-results {
      text-align: center;
      padding: 80px 20px;
      color: #9e8472;
    }
    .no-results svg { margin-bottom: 20px; opacity: .4; }
    .no-results p { font-size: 1.05rem; }

    /* animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeUp .4s both; }
    .detail-card { animation: fadeUp .35s both; }
    #detail .back-btn { animation: fadeUp .25s both; }

    /* mobile */
    @media (max-width: 600px) {
      .header-inner { height: 62px; }
      .logo { font-size: 1.1rem; }
      .hero { padding: 36px 0 32px; }
      .detail-header { padding: 32px 24px 28px; }
      .detail-body { padding: 28px 24px 36px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" onclick="goHome()" style="cursor:pointer">Deyim<span>&amp;</span>Hikaye</a>
    <div class="search-wrap" id="searchWrap">
      <svg class="search-icon" width="18" height="18" fill="none" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
        <path d="M16.5 16.5 21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Deyim veya hikaye ara…" autocomplete="off" />
    </div>
  </div>
</header>

<main>
  <!-- LIST PAGE -->
  <div id="listPage">
    <div class="hero">
      <div class="hero-eyebrow">İngilizce Projesi</div>
      <h1>Deyimlerin Gizli Tarihi</h1>
      <p>Her deyimin arkasında asırlık bir hikaye yatar. Kültürler arası anlam yolculuğuna çıkın.</p>
      <span class="count-badge" id="countBadge">21 deyim</span>
    </div>
    <div class="grid" id="grid"></div>
    <div class="no-results" id="noResults" style="display:none">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="8" stroke="#c4a882" stroke-width="1.5"/>
        <path d="M16.5 16.5 21 21" stroke="#c4a882" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M8 11h6M11 8v6" stroke="#c4a882" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <p>Arama sonucu bulunamadı.</p>
    </div>
  </div>

  <!-- DETAIL PAGE -->
  <div id="detail">
    <button class="back-btn" id="backBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M5 12l7 7M5 12l7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Ana Listeye Dön
    </button>
    <div class="detail-card" id="detail-content"></div>
  </div>
</main>

<script>
// ─────────────────────────────────────────────────────────────
// VERİ — Tam ve ayrıntılı hikayeler
// ─────────────────────────────────────────────────────────────
const IDIOMS = [
  {
    id: "haste-makes-waste",
    en: "Haste makes waste",
    tr: "Acele işe şeytan karışır",
    tag: "Ortak Köken",
    story: `Bu deyim, ortak bir insanlık deneyiminden doğmuştur: acelecilik hataları beraberinde getirir ve çoğu zaman işi yeniden yapmak zorunda kalınır. Türkçe versiyonun kökeni ilgi çekici bir hikayeye dayanır: Şam'a giden bir kervana katılmak zorunda kalan bir köle, efendisinden emanet aldığı değerli bir testiyi güvenle ulaştırması gerekiyordu. Yolda gecikmeden korkan köle, var gücüyle koşmaya başladı. Ancak dar bir yolda ayağı kaydı ve testi parçalara ayrıldı. Pişmanlık içinde "Ne yapalım, acele ettim, işime şeytan karıştı" dedi. Bu söz halk arasında yayıldı ve zamanla atasözüne dönüştü.

    İngilizce versiyonu ise Benjamin Franklin'in 1736 yılında "Poor Richard's Almanack" adlı yıllık yayınında kalıcı biçimde yerini almıştır. Franklin, pratik yaşam bilgeliğini kısa ve akılda kalıcı atasözleriyle aktarmayı seviyordu. "Haste makes waste" — Acelecilik israf yaratır — ifadesiyle hem maddi hem de zamansal kayıpları kast ediyordu.

    Her iki kültür de bağımsız olarak aynı gerçeği keşfetmiştir: İnsan zihni acelede doğru karar veremez, elle iş yapılırken acele hatayı davet eder, ve sonunda işi ikinci kez yapmak ilk seferinde dikkatli olmaktan çok daha fazla zaman alır.`
  },
  {
    id: "back-burner",
    en: "To put on the back burner",
    tr: "Pabucu dama atılmak",
    tag: "Farklı Kökenler",
    storyTR: `Osmanlı döneminde esnaf ahlakı ve dürüstlük son derece önemliydi. Ahilik teşkilatı, zanaatkârlar arasındaki ahlaki standartları denetleyen güçlü bir lonca sistemiydi. Bu sistem içinde bir ayakkabıcının müşterisine hile yapması, kalitesiz malzeme kullanması ya da ölçüleri kasıtlı olarak yanlış kesmesi son derece ağır bir suç sayılırdı.

    Hile yapan bir ayakkabıcı tespit edildiğinde, Ahilik heyeti bir soruşturma başlatır ve suç ispatlanırsa o ayakkabıcının pabucu —mesleğinin ve şerefinin simgesi— alınarak ibret-i alem olsun diye dükkanın damına atılırdı. Mahalle halkı damdaki pabucu gördüğünde, o esnafın artık güvenilmez olduğunu anlardı ve alışverişi keserdi. Böylece hem toplumsal kınama hem de ekonomik yaptırım uygulanmış olurdu.

    "Pabucu dama atılmak" deyimi zamanla genişleyerek, sadece ayakkabıcılık mesleğiyle sınırlı kalmayıp, genel olarak birinin işine, makamına ya da itibarına son verilmesi anlamını kazandı. Bugün hâlâ "artık onun pabucu dama atıldı" dediğimizde, o kişinin etkisini, gücünü veya prestijini yitirdiğini kastediyoruz.`,
    storyEN: `"To put on the back burner" deyimi, mutfak kültüründen doğmuş son derece somut bir mecazdır. Büyük ocaklarda, özellikle 19. ve 20. yüzyılın başlarında kullanılan odun ya da kömür sobalarında, ön gözler yüksek ısı için, arka gözler ise düşük ısıda sıcak tutmak ya da yavaş yavaş pişirmek için kullanılırdı.

    Bir yemek ya da sıvı, arka gözde bekletildiğinde kaynamıyor ama soğumuyordu da; sadece ılık ve ulaşılabilir bir konumda tutuluyordu. Bu fiziksel gerçeklikten doğan mecaz, 1930'lu yıllarda İngiliz ve Amerikan günlük diline girdi. "Bunu back burner'a koyalım" demek, o konunun tamamen rafa kaldırılmadığı ama şu an için öncelik sırasının sonuna atıldığı anlamına geliyordu.

    İkinci Dünya Savaşı döneminde özellikle siyasi ve askeri bağlamlarda yaygın kullanım alanı bulan bu deyim, sonraki on yıllarda iş hayatına, politikaya ve günlük dile yerleşti. Bugün "to be put on the back burner" dediğimizde, bir projenin, bir ilişkinin veya bir planın şimdilik ertelendiğini ama tamamen unutulmadığını ifade ederiz.`
  },
  {
    id: "lie-has-no-legs",
    en: "A lie has no legs",
    tr: "Yalancının mumu yatsıya kadar yanar",
    tag: "Ortak Köken",
    story: `Bu deyimin kökeni, Osmanlı ve İslam dünyasında günlük yaşamın vazgeçilmez bir parçası olan mum ve gece aydınlatmasına dayanır. Kaliteli mumlar gece boyunca yanabilirken, ucuz ve kalitesiz maddelerden yapılmış mumlar yatsı namazının vakti olan gece ortasına kadar ancak dayanabilirdi.

    Halk bu gözlemden hareketle bir mecaz geliştirdi: Nasıl ki kalitesiz bir mum gece yarısına kadar bile tutunamıyorsa, yalanlar da uzun süre ayakta duramaz. Yalancının "mumu" —yani yalanı— gece yarısı söner. Toplumsal hafızada bu görüntü son derece güçlü bir yer edindi.

    İngilizce versiyonu olan "A lie has no legs" ise aynı gerçeği farklı bir mecazla anlatır: Yalancının yalanı, bir canlı gibi ayakları olmayan bir varlıktır — durur, yıkılır. Her iki deyim de insanlığın ortak deneyimini yansıtır: Gerçek ne kadar ertelenirse ertelensin, yalan eninde sonunda kendini ele verir ve yıkılır. Doğruluk, uzun vadede her zaman yalanı geride bırakır.`
  },
  {
    id: "many-a-little",
    en: "Many a little makes a mickle",
    tr: "Damlaya damlaya göl olur",
    tag: "Ortak Köken",
    story: `Türkçe deyimin kökeni, Anadolu'nun yarı kurak coğrafyasında, özellikle İç ve Güneydoğu Anadolu'nun su kıtlığıyla boğuşan köylerinde yatar. Bu bölgelerde yağmur suyu son derece değerliydi. Köylüler, taş ve topraktan inşa ettikleri sarnıçlara çatılardan, kayalıklardan ve zemin üzerinden gelen su damlalarını biriktirirlerdi.

    Tek bir damlanın hiçbir anlamı yokmuş gibi görünürdü. Ama yeterince sabır gösterildiğinde, bu damlalar zamanla büyük miktarlarda suya dönüşürdü. Bir sarnıcı ya da gölü dolduran şey, hiçbir tek tek fark yaratmıyor gibi görünen binlerce, milyonlarca damlaydı. Bu gözlem Anadolu halkının bilgeliğine işledi ve "damlaya damlaya göl olur" deyimi doğdu.

    İskoçça ve İngilizce'de yer alan "Many a mickle makes a muckle" ya da "Many a little makes a mickle" deyimi de aynı gerçeği dile getirir. İskoçça'da "mickle" küçük bir miktar, "muckle" ise büyük bir miktar anlamına gelir. Bu deyim, küçük birikim alışkanlığının erdemini anlatır. Her iki kültür de, küçücük ve anlamsız görünen katkıların zamanla dev bir bütün oluşturabileceğini kavramıştır.`
  },
  {
    id: "trick-of-the-trade",
    en: "The trick of the trade",
    tr: "İşin püf noktası",
    tag: "Ortak Köken",
    story: `"Püf noktası" deyiminin kökeni, Türk el sanatları geleneğiyle, özellikle de çömlekçilik ve seramik işçiliğiyle iç içe geçmiştir. Usta-çırak ilişkisinin çok önem taşıdığı bu gelenekte, bilgi kuşaktan kuşağa aktarılırdı. Her ustanın, öğrencilerine kolayca açıklamadığı küçük sırları bulunurdu.

    Hikayeye göre genç bir çömlek çırağı, ustasından defalarca kap yapmayı öğrenmesine rağmen, fırından çıkan kaplar hep çatlardı. Diğer çırakların kapları sağlam çıkıyordu ama bu genç bir türlü sırrı çözemiyordu. Sonunda dayanamayıp ustasına sordu. Usta güldü ve dedi ki: "Fırından yeni çıkmış kaba, tam orta noktasına 'püf' diye üfle. Eğer içinde küçük bir hava kabarcığı kalırsa, soğuma sırasında o kabarcık büyür ve kabı çatlatır. Ama nazikçe üflersen, o kabarcığı söndürürsün."

    Bu küçük ama hayati sır, "işin püf noktası" deyimini doğurdu. İngilizce "trick of the trade" da aynı fikri taşır: her zanaatın, işin ya da mesleğin, dışarıdan görülmeyen ama içeridekiler için son derece değerli olan gizli bilgileri vardır. Bu bilgi, kitaplarda değil, ustadan çırağa aktarımda yaşar.`
  },
  {
    id: "cross-the-line",
    en: "Cross the line",
    tr: "Çizmeyi aşmak",
    tag: "Ortak Köken",
    story: `Bu deyimin en bilinen ve keyifli köken hikayesi, ünlü Fransız ressam Jean-Léon Gérôme'a atfedilen bir anekdota dayanır. Gérôme, 19. yüzyılın en önemli Oryantalist ressamlarından biriydi ve tabloları büyük bir titizlikle çalışılmış ayrıntılarla doluydu.

    storyTR: `Türkçe'deki "dişini sıkmak" deyimi, fiziksel bir tepkiden doğan çok doğal bir mecaza sahiptir. İnsanlar tarihin her döneminde şiddetli acıyla ya da büyük bir zorlukla karşılaştıklarında, dişlerini sıkarak dayanmaya çalışmışlardır. Bu, hem bilinçli hem de içgüdüsel bir tepkidir.

    storyTR: `Türkçe deyimin kökeni, ekonomik sıkıntının giysi aracılığıyla dışarıdan okunabildiği bir dönemin gerçekliğine dayanır. Anadolu'da yoksul ailelerin çocukları ya da maddi durumu bozulan kişiler, eskiyen ya da çürüyen giysilerini yamalatarak ya da değiştirerek giyerlerdi.

    storyTR: `Türkçe deyimin kökeni Osmanlı ölçü sistemine ve kuyumculuk geleneğine dayanır. Osmanlı'da ağırlık birimi olarak dirhem kullanılırdı; bir dirhem yaklaşık 3,2 gram geliyordu. Altın ve gümüş takılar, kumaşlar ve değerli eşyalar bu birimle tartılıp satılırdı.

    storyEN: `İngilizce "dressed to the nines" ifadesinin kökeni konusunda çeşitli teoriler mevcuttur. En yaygın kabul gören açıklama, terzilik ve dikiş sanatına dayanır. 18. ve 19. yüzyıllarda, bir beyefendinin kusursuz ve gösterişli bir takım elbisesi diktirmek için terziye tam dokuz yarda (yaklaşık 8,2 metre) kumaş vermesi gerektiği söylenirdi. Dokuz yarda kumaş, mükemmel bir kesim, bol etekler ve tam oturan bir ceket için gerekli olan miktardı.

  {

    tr: "Hapı yutmak",
    tag: "Farklı Kökenler",
    storyTR: `Türkçe "hapı yutmak" deyiminin kökeni, Osmanlı döneminin yasak ve tehlikeli bir gerçekliğine uzanır. IV. Murad döneminde (1623–1640) kahve ve tütün yasaklarıyla birlikte afyon da ciddi kısıtlamalarla karşılaştı. Afyon başta Mısır ve İran olmak üzere geniş coğrafyalarda kullanılan bir uyuşturucuydu ve Osmanlı'da bazı dönemlerde hem üretimi hem de tüketimi yasaklandı.

    Bu dönemde afyon, küçük toplar ya da haplar hâlinde taşınırdı. Zabıta ya da yeniçeriler baskın yaptığında, afyon taşıyan kişiler cezadan kurtulmak için ellerindeki hapları hızla yutarlardı. Hem suç delilini yok etmeye hem de cezadan kaçmaya çalışırlardı. Ancak bu çoğu zaman işe yaramazdı; baskın yapanlar bu hileli hareketi bildiğinden şüpheliyi gözaltına alırlardı. Dahası, yuttuğu maddenin toksik etkisi kişiyi hasta edebilir, hatta bazen öldürebilirdi.

    "Hapı yutmak" deyimi böylece "çok kötü bir duruma düşmek, mahvolmak, büyük bir belaya girmek" anlamını kazandı. Bugün de aynı anlamda kullanılır: "Hapı yuttuk" — işimiz bitti, büyük bir belaya düştük.`,
    storyEN: `İngilizce "bite the dust" deyiminin kökeni, savaş alanı sahnelerine dayanır. Vurularak ya da yaralanarak düşen bir savaşçının, yüzüstü yere kapandığında yüzünün toprağa değmesi ve ağzının tozu ısırması son derece canlı bir görsel imgedir. Bu sahne, hem antik Yunan ve Roma edebiyatında hem de İncil'de benzer ifadelerle yer alır.

// ─────────────────────────────────────────────────────────────
// DURUM: Şu an hangi deyim açık? (null = liste görünümü)
// ─────────────────────────────────────────────────────────────
let currentId = null;

// ─────────────────────────────────────────────────────────────
// YARDIMCI: Listeyi göster
// ─────────────────────────────────────────────────────────────
function showList(filter) {
  filter = filter || '';
  currentId = null;

  document.getElementById('listPage').style.display = 'block';
  document.getElementById('detail').style.display = 'none';
  document.getElementById('searchWrap').style.display = '';

  const q = filter.toLowerCase().trim();
  const filtered = q
    ? IDIOMS.filter(d =>
        d.en.toLowerCase().includes(q) ||
        d.tr.toLowerCase().includes(q) ||
        (d.story  || '').toLowerCase().includes(q) ||
        (d.storyTR || '').toLowerCase().includes(q) ||
        (d.storyEN || '').toLowerCase().includes(q)
      )
    : IDIOMS;

  document.getElementById('countBadge').textContent = filtered.length + ' deyim';
  document.getElementById('noResults').style.display = filtered.length ? 'none' : 'block';

  const grid = document.getElementById('grid');
  grid.innerHTML = filtered.map(function(d, i) {
    const idx = (IDIOMS.indexOf(d) + 1).toString().padStart(2, '0');
    const preview = (d.story || d.storyTR || '').substring(0, 160) + '…';
    return '<div class="card" style="animation-delay:' + (i * 0.04) + 's" onclick="openDetail(\'' + d.id + '\')">' +
      '<div class="card-top">' +
        '<div class="card-num">Deyim ' + idx + '</div>' +
        '<div class="card-en">' + d.en + '</div>' +
        '<div class="card-tr">' + d.tr + '</div>' +
        '<div class="card-preview">' + preview + '</div>' +
      '</div>' +
      '<div class="card-footer">' +
        '<span class="tag">' + d.tag + '</span>' +
        '<button class="btn-incele" onclick="event.stopPropagation();openDetail(\'' + d.id + '\')">İncele →</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ─────────────────────────────────────────────────────────────
// YARDIMCI: Detay sayfasını göster
// ─────────────────────────────────────────────────────────────
function openDetail(id) {
  const item = IDIOMS.find(function(d) { return d.id === id; });
  if (!item) { showList(); return; }

  currentId = id;

  // Sayfaları değiştir
  document.getElementById('listPage').style.display = 'none';
  document.getElementById('detail').style.display = 'block';
  document.getElementById('searchWrap').style.display = 'none';

  // Numara hesapla
  const num = (IDIOMS.indexOf(item) + 1).toString().padStart(2, '0');

  // Hikaye HTML'i oluştur
  var storyHTML = '';
  if (item.story) {
    // Paragrafları <p> etiketlerine çevir
    var paragraphs = item.story.split(/\n\s*\n/).map(function(p) {
      return '<p class="story-text">' + p.trim().replace(/\n/g, ' ') + '</p>';
    }).join('<br>');
    storyHTML =
      '<div class="story-section">' +
        '<div class="story-label">Hikayenin Kökeni</div>' +
        paragraphs +
      '</div>';
  } else {
    var paragraphsTR = item.storyTR.split(/\n\s*\n/).map(function(p) {
      return '<p class="story-text">' + p.trim().replace(/\n/g, ' ') + '</p>';
    }).join('<br>');
    var paragraphsEN = item.storyEN.split(/\n\s*\n/).map(function(p) {
      return '<p class="story-text accent-border">' + p.trim().replace(/\n/g, ' ') + '</p>';
    }).join('<br>');
    storyHTML =
      '<div class="story-section">' +
        '<div class="story-label"><span class="story-flag">🇹🇷</span> Türkçe Köken</div>' +
        paragraphsTR +
      '</div>' +
      '<hr class="divider"/>' +
      '<div class="story-section">' +
        '<div class="story-label"><span class="story-flag">🇬🇧</span> İngilizce Köken</div>' +
        paragraphsEN +
      '</div>';
  }

  // innerHTML ile detay içeriğini bas
  document.getElementById('detail-content').innerHTML =
    '<div class="detail-header">' +
      '<div class="detail-num">Deyim ' + num + ' &nbsp;·&nbsp; ' + item.tag + '</div>' +
      '<div class="detail-en">' + item.en + '</div>' +
      '<div class="detail-tr">' + item.tr + '</div>' +
    '</div>' +
    '<div class="detail-body">' + storyHTML + '</div>';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─────────────────────────────────────────────────────────────
// Ana listeye dön
// ─────────────────────────────────────────────────────────────
function goHome() {
  document.getElementById('searchInput').value = '';
  showList('');
}

// ─────────────────────────────────────────────────────────────
// OLAY DİNLEYİCİLER
// ─────────────────────────────────────────────────────────────
document.getElementById('backBtn').addEventListener('click', function() {
  document.getElementById('searchInput').value = '';
  showList('');
});

document.getElementById('searchInput').addEventListener('input', function() {
  if (!currentId) {
    showList(this.value);
  }
});

// ─────────────────────────────────────────────────────────────
// İLK YÜKLEME VE YÖNLENDİRME (KAREKOD İÇİN)
// ─────────────────────────────────────────────────────────────
// Sitenin adresinde bir "id" parametresi var mı diye kontrol et
const urlParametreleri = new URLSearchParams(window.location.search);
const gelenId = urlParametreleri.get('id');

// Eğer linkte id varsa (örneğin ?id=haste-makes-waste), o deyimi aç
if (gelenId) {
  openDetail(gelenId);
} else {
  // Eğer id yoksa normal ana sayfayı (listeyi) göster
  showList('');
}
</script>
</body>
</html>
